name: Deploy to Tencent Cloud

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Show target
        run: |
          echo "Deploy target: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT }}"
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            # Ensure base tools
            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y git
            fi
            if ! command -v python3 >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y python3
            fi
            if ! command -v pip3 >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y python3-pip
            fi

            BRANCH="${{ secrets.BRANCH }}"
            if [ -z "$BRANCH" ]; then BRANCH="main"; fi

            mkdir -p "${{ secrets.DEPLOY_DIR }}"
            cd "${{ secrets.DEPLOY_DIR }}"

            if [ ! -d ".git" ]; then
              # First-time clone
              if [ -z "${{ secrets.REPO_URL }}" ]; then
                echo "REPO_URL secret missing"; exit 1
              fi
              git clone "${{ secrets.REPO_URL }}" .
            fi

            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ -f requirements.txt ]; then
              pip3 install -r requirements.txt
            fi

            if [ -n "${{ secrets.RESTART_CMD }}" ]; then
              eval "${{ secrets.RESTART_CMD }}"
            else
              echo "RESTART_CMD secret not set; skipping restart"
            fi
